<svg xmlns="http://www.w3.org/2000/svg"
     viewBox="0 0 32 32"
     width="32" height="32"
     fill="currentColor">
  <!--
    Carbon Design System style — 32x32 grid, 1px stroke weight,
    filled paths, currentColor.
    3x3 Rubik's cube (scaled to upper-left) + bar chart analysis badge.
  -->

  <!-- ======= CUBE (scaled down, shifted upper-left) ======= -->
  <!-- Cube vertices: apex(11,2) right(21,7.5) center(11,13) left(1,7.5)
       bottom: left(1,18.5) center(11,24) right(21,18.5) -->

  <!-- TOP FACE -->
  <polygon points="11,2 21,7.5 11,13 1,7.5"
           fill="none" stroke="currentColor" stroke-width="1.5" stroke-linejoin="round"/>
  <!-- top grid left-lean -->
  <line x1="7.7" y1="4.5"  x2="17.7" y2="10"   stroke="currentColor" stroke-width="0.9"/>
  <line x1="4.3" y1="7"    x2="14.3" y2="12.5"  stroke="currentColor" stroke-width="0.9"/>
  <!-- top grid right-lean -->
  <line x1="14.3" y1="4.5" x2="4.3"  y2="10"   stroke="currentColor" stroke-width="0.9"/>
  <line x1="17.7" y1="7"   x2="7.7"  y2="12.5"  stroke="currentColor" stroke-width="0.9"/>

  <!-- LEFT FACE -->
  <polygon points="1,7.5 11,13 11,24 1,18.5"
           fill="none" stroke="currentColor" stroke-width="1.5" stroke-linejoin="round"/>
  <!-- left face vertical cols -->
  <line x1="4.3" y1="10"   x2="4.3"  y2="21"   stroke="currentColor" stroke-width="0.9"/>
  <line x1="7.7" y1="12.5" x2="7.7"  y2="23.5"  stroke="currentColor" stroke-width="0.9"/>
  <!-- left face horizontal rows -->
  <line x1="1"   y1="11.7" x2="11"   y2="17.2"  stroke="currentColor" stroke-width="0.9"/>
  <line x1="1"   y1="15.8" x2="11"   y2="21.3"  stroke="currentColor" stroke-width="0.9"/>

  <!-- RIGHT FACE -->
  <polygon points="11,13 21,7.5 21,18.5 11,24"
           fill="none" stroke="currentColor" stroke-width="1.5" stroke-linejoin="round"/>
  <!-- right face vertical cols -->
  <line x1="14.3" y1="12.5" x2="14.3" y2="23.5"  stroke="currentColor" stroke-width="0.9"/>
  <line x1="17.7" y1="10"   x2="17.7" y2="21"    stroke="currentColor" stroke-width="0.9"/>
  <!-- right face horizontal rows -->
  <line x1="11"   y1="17.2" x2="21"   y2="11.7"  stroke="currentColor" stroke-width="0.9"/>
  <line x1="11"   y1="21.3" x2="21"   y2="15.8"  stroke="currentColor" stroke-width="0.9"/>

  <!-- ======= BAR CHART ANALYSIS (bottom-right) ======= -->
  <!-- baseline -->
  <line x1="19" y1="31" x2="31" y2="31" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
  <!-- bar 1 — short, x=19.5, height 4 -->
  <rect x="19.5" y="27" width="3" height="4" rx="0.5" fill="currentColor"/>
  <!-- bar 2 — medium, x=24, height 7 -->
  <rect x="24"   y="24" width="3" height="7" rx="0.5" fill="currentColor"/>
  <!-- bar 3 — tall, x=28.5, height 11 -->
  <rect x="28.5" y="20" width="3" height="11" rx="0.5" fill="currentColor"/>

</svg>