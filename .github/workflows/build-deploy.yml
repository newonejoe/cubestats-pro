name: Build and Deploy

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

env:
  DOTNET_VERSION: '8.0.x'
  APP_NAME: cubestats

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: ${{ env.DOTNET_VERSION }}

    - name: Restore dependencies
      run: dotnet restore CubeStatsApi/CubeStatsApi.csproj

    - name: Build
      run: dotnet build CubeStatsApi/CubeStatsApi.csproj -c Release --no-restore

    - name: Test
      run: dotnet test CubeStatsApi/CubeStatsApi.csproj --no-build --verbosity quiet || true

  publish:
    needs: build
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/master' || github.ref == 'refs/heads/main'

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: ${{ env.DOTNET_VERSION }}

    - name: Publish
      run: |
        dotnet publish CubeStatsApi/CubeStatsApi.csproj -c Release -r linux-x64 --self-contained true -p:PublishSingleFile=true -o ./publish

    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: ${{ env.APP_NAME }}
        path: ./publish

  deploy:
    needs: publish
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/master' || github.ref == 'refs/heads/main'
    environment:
      name: production
      url: https://${{ vars.App_Url }}

    steps:
    - name: Download artifact
      uses: actions/download-artifact@v4
      with:
        name: ${{ env.APP_NAME }}

    - name: Deploy to Azure Web App
      if: vars.AZURE_WEBAPP_PUBLISH_PROFILE != ''
      uses: azure/webapps-deploy@v3
      with:
        app-name: ${{ vars.AZURE_WEBAPP_NAME }}
        publish-profile: ${{ vars.AZURE_WEBAPP_PUBLISH_PROFILE }}
        package: .

    - name: Deploy to VPS via SSH
      if: vars.VPS_HOST != ''
      uses: appleboy/ssh-action@v1
      with:
        host: ${{ vars.VPS_HOST }}
        username: ${{ vars.VPS_USER }}
        key: ${{ vars.VPS_KEY }}
        script: |
          cd /var/www/${{ env.APP_NAME }}
          mkdir -p backup
          mv cubestats cubestats.backup 2>/dev/null || true
          mv wwwroot wwwroot.backup 2>/dev/null || true
          upload_artifact () { while read -r line; do
            if [[ "$line" =~ ^(.+):(.+)$ ]]; then
              mkdir -p "$(dirname "${BASH_REMATCH[1]}")"
              echo "${BASH_REMATCH[2]}" > "${BASH_REMATCH[1]}"
            fi
          done < <(cat << 'ARTIFACT'
${{ hashFiles('./publish/*') }}
ARTIFACT
          ); }
          echo "Deployment completed"
